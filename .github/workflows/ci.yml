name: PR Quality Gate

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        # Hard gate. Live integration suites self-skip without Supabase env
        # (no .env.local on CI); pure + fully-mocked route tests must pass.
        # S4/S5 placeholders are .skip (skipped ≠ failed), so they don't block.
        run: npm run test

      - name: Build
        run: npm run build

      - name: Audit
        # Gate on production-runtime deps only. Dev-tooling advisories (e.g. the
        # esbuild dev-server SSRF in the vitest chain) never ship to production;
        # they're tracked but not release-blocking — matches the project convention.
        run: npm audit --omit=dev --audit-level=high
